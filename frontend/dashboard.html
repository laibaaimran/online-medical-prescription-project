<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width,initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body style="background:#f5f7fb;">

    <div class="container mt-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>
                <i class="bi bi-heart-pulse"></i> Patient Dashboard
            </h3>

            <a href="create.html" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> New Prescription
            </a>
        </div>

        <!-- Search -->
        <input type="text" id="search" class="form-control mb-4" placeholder="Search patient..." oninput="searchPatient()">

        <!-- Cards -->
        <div id="patientList" class="row"></div>

    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
