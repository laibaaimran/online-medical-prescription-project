<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width,initial-scale=1.0">
    <title>Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(-45deg, #e3f2fd, #ffffff, #e1f5fe);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .card-box {
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .feature-card {
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
            background: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }
        
        .feature-card:hover {
            transform: translateY(-8px);
        }
        
        .icon {
            font-size: 30px;
            margin-bottom: 10px;
            color: #0d6efd;
        }
    </style>
</head>

<body>

    <div class="card-box">
        <h2 class="mb-4 text-primary fw-bold">
            Medical Prescription System
        </h2>

        <div class="row g-4">

            <!-- LOGIN -->
            <div class="col-md-4">
                <a href="login.html" style="text-decoration:none; color:inherit;">
                    <div class="feature-card">
                        <div class="icon"><i class="bi bi-person-circle"></i></div>
                        <h5>Login</h5>
                        <p class="text-muted">Access system securely</p>
                    </div>
                </a>
            </div>

            <!-- DASHBOARD -->
            <div class="col-md-4">
                <a href="dashboard.html" style="text-decoration:none; color:inherit;">
                    <div class="feature-card">
                        <div class="icon"><i class="bi bi-speedometer2"></i></div>
                        <h5>Dashboard</h5>
                        <p class="text-muted">View records & overview</p>
                    </div>
                </a>
            </div>

            <!-- CREATE -->
            <div class="col-md-4">
                <a href="create.html" style="text-decoration:none; color:inherit;">
                    <div class="feature-card">
                        <div class="icon"><i class="bi bi-file-earmark-medical"></i></div>
                        <h5>Create Prescription</h5>
                        <p class="text-muted">Generate prescription & diet</p>
                    </div>
                </a>
            </div>

        </div>
    </div>

</body>

</html>
