<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <title>Prescription</title>
</head>


<body>
    <div class="container mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Create Prescription</h2>
            <p class="text-muted">Fill patients detail</p>
        </div>
    </div>
    <div class="container">

        <input id="patient" placeholder="Patient Name">

        <input id="age" placeholder="Age">

        <select id="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
           
        </select>

        <input id="bp" placeholder="Blood Pressure">

        <input id="diagnosis" placeholder="Diagnosis">

        <div id="meds">
            <input class="med" placeholder="Medicine" oninput="fetchSideEffects()">
        </div>

        <button class="add-btn" onclick="addMed()">+ Add Medicine</button><br>

        <textarea id="diet" placeholder="Diet Plan"></textarea><br>
        <button onclick="showDiet()" class="btn btn-success mt-2">Generate Diet</button>
        <div id="dietContainer"></div>
        <input type="hidden" id="dietData">

        <textarea id="notes" placeholder="Notes"></textarea><br>

        <textarea id="sideEffects" placeholder="Side Effects"></textarea><br>

        <button onclick="submitData()">Submit</button>

    </div>
    <script src="js/diet.js"></script>
    <script src="js/prescription.js"></script>


</body>

</html>
